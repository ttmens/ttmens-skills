# Per-stage goals — copy to goals/{stage}.yaml
# Verified by goal-check.py
stage: align
goals:
  - id: A1
    description: 'CONTEXT.md with glossary table'
    type: content_match
    target: 'CONTEXT.md'
    pattern: '\|.*\|.*\|'
  - id: A2
    description: 'No TBD markers in CONTEXT'
    type: forbidden
    target: 'CONTEXT.md'
    pattern: 'TBD|待定'
  - id: A3
    description: 'Assumption debate resolved'
    type: debate_resolved
    debates_dir: 'debates'
    stage_prefix: 'align'
