# Per-stage goals template — copy to goals/{stage}.yaml
# Verified by goal-check.py
# v6.2: All stages should have goals files; MVP/Ship/Retro are mandatory
#
# USAGE: Copy this file to goals/{stage}.yaml and uncomment/edit the relevant section.
# Each stage has its own goals block below, separated by comments.

# ============================================================
# STAGE: align (G1 gate — debate required)
# ============================================================
stage: align
goals:
  - id: A1
    description: 'CONTEXT.md with glossary table and assumption analysis (min 50 lines)'
    type: content_match
    target: 'CONTEXT.md'
    pattern: '\|.*\|.*\|'
  - id: A2
    description: 'No TBD markers in CONTEXT'
    type: forbidden
    target: 'CONTEXT.md'
    pattern: 'TBD|待定'
  - id: A3
    description: 'Assumption debate resolved in debates/'
    type: debate_resolved
    debates_dir: 'debates'
    stage_prefix: 'align'
  - id: A4
    description: 'decisions.md contains risk assessment'
    type: content_match
    target: 'decisions.md'
    pattern: '风险|risk|影响|impact'

